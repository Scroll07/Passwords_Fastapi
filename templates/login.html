{% extends "base.html" %}

{% block title %}Login - Pas CLI{% endblock %}

{% block content %}
<main>
    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                {% if error %}
                    <div class="form-error">{{ error }}</div>
                {% endif %}
                
                <h1>Login</h1>

                <form class="auth-form" id="auth-form" method="post" action="{{ url_for('login') }}">
                    <div class="form-group">
                        <label for="username">username</label>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            placeholder="username"
                            required
                            value={{ form_data.username if form_data else '' }}
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">password</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="••••••••"
                            required
                            value={{ form_data.password if form_data else '' }}
                        >
                    </div>

                    <button type="submit" class="auth-submit">Sign in</button>
                </form>

                <div class="auth-links">
                    <a href="{{ url_for('forgot_password') }}">Forgot password</a>
                    <p>Don’t have an account? <a href="{{ url_for('register') }}">Sign up</a></p>
                </div>
            </div>
        </div>
    </section>
</main>
{% endblock %}
