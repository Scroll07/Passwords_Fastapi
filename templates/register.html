{% extends "base.html" %}

{% block title %}Sign Up - Pas CLI{% endblock %}

{% block content %}
<main>
    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                
                {% if error %}
                    <div class="form-error">{{ error }}</div>
                {% endif %}
                
                <h1>Create account</h1>

                <form class="auth-form" id="auth-form" method="post" action="{{ url_for('register') }}">
                    <div class="form-group">
                        <label for="username">username</label>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            placeholder="username"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">password</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="••••••••"
                            required
                            value={{ form_data.username if form_data else '' }}
                        >
                    </div>

                    <div class="form-group">
                        <label for="confirm_password">confirm password</label>
                        <input
                            type="password"
                            id="confirm_password"
                            name="confirm_password"
                            placeholder="••••••••"
                            required
                            value={{ form_data.password if form_data else '' }}
                        >
                    </div>

                    <button type="submit" class="auth-submit">Create account</button>
                </form>

                <div class="auth-links auth-links-center">
                    <p>Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
                </div>
            </div>
        </div>
    </section>
</main>
{% endblock %}
